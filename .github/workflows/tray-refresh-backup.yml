# Backup cron externo do refresh do token Tray.
# Pra commitar em Armazemautopecas/landing-pages-armazem-diesel:.github/workflows/tray-refresh-backup.yml
#
# Secrets a criar no repo (Settings → Secrets and variables → Actions):
#   LUNA_TRAY_REFRESH_HMAC = (valor de TRAY_REFRESH_HMAC_SECRET no .env do Luna)
#
# Endpoint chamado: https://luna.armazemautomacao.com.br/admin/tray-refresh
# (TODO Vinicius: confirmar/criar subdomínio Traefik apontando 0.0.0.0:3005 do Luna)
name: Tray Token Refresh — Backup (defesa em camadas)

on:
  schedule:
    # Roda 30min depois do cron do Luna pra cobrir falha do primário.
    # Primário roda :00 de cada hora. Backup roda :30.
    - cron: "30 * * * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Compute HMAC + call Luna endpoint
        env:
          HMAC_SECRET: ${{ secrets.LUNA_TRAY_REFRESH_HMAC }}
          ENDPOINT: ${{ vars.LUNA_REFRESH_ENDPOINT }}
        run: |
          set -euo pipefail
          : "${HMAC_SECRET:?LUNA_TRAY_REFRESH_HMAC não definido}"
          : "${ENDPOINT:?LUNA_REFRESH_ENDPOINT não definido}"
          BODY="{}"
          SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$HMAC_SECRET" -hex | awk '{print $2}')
          echo "Calling $ENDPOINT"
          HTTP=$(curl -sS -o /tmp/resp.json -w '%{http_code}' \
            -X POST "$ENDPOINT" \
            -H "Content-Type: application/json" \
            -H "X-Signature: $SIG" \
            --data "$BODY" || echo 000)
          echo "HTTP $HTTP"
          cat /tmp/resp.json
          test "$HTTP" = "200"
